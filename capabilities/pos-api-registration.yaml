naftiko: 1.0.0-alpha2
info:
  label: Deliverect POS API — Registration
  description: 'Registration surface of the Deliverect POS API. 1 operations. Lead operation: Register POS. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - POS
  - Registration
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: pos-api-registration
    baseUri: https://api.deliverect.com
    description: Deliverect POS API — Registration business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: register
      path: /register
      operations:
      - name: pos_register
        method: POST
        description: Deliverect Register POS
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: pos-api-registration-rest
    port: 8080
    description: REST adapter for Deliverect POS API — Registration. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/register
      name: register
      description: REST surface for register.
      operations:
      - method: POST
        name: pos_register
        description: Deliverect Register POS
        call: pos-api-registration.pos_register
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pos-api-registration-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect POS API — Registration. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: register-pos
      description: Deliverect Register POS
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pos-api-registration.pos_register
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
