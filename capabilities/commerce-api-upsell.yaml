naftiko: 1.0.0-alpha2
info:
  label: Deliverect Commerce API — Upsell
  description: 'Upsell surface of the Deliverect Commerce API. 1 operations. Lead operation: Get Upsell Items. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - Commerce
  - Upsell
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: commerce-api-upsell
    baseUri: https://api.deliverect.com
    description: Deliverect Commerce API — Upsell business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: upsell-channel-channel-link-id
      path: /upsell/channel/{channelLinkId}
      operations:
      - name: getUpsellItems
        method: POST
        description: Deliverect Get Upsell Items
        inputParameters:
        - name: channelLinkId
          in: path
          type: string
          required: true
          description: The unique identifier of a channel link for a store location
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: commerce-api-upsell-rest
    port: 8080
    description: REST adapter for Deliverect Commerce API — Upsell. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/upsell/channel/{channel-link-id}
      name: upsell-channel-channel-link-id
      description: REST surface for upsell-channel-channel-link-id.
      operations:
      - method: POST
        name: getUpsellItems
        description: Deliverect Get Upsell Items
        call: commerce-api-upsell.getUpsellItems
        with:
          channelLinkId: rest.channelLinkId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: commerce-api-upsell-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect Commerce API — Upsell. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: get-upsell-items
      description: Deliverect Get Upsell Items
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: commerce-api-upsell.getUpsellItems
      with:
        channelLinkId: tools.channelLinkId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
