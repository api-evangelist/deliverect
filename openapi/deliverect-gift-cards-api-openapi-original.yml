      parameters:
      - name: channelLinkId
        in: path
        required: true
        schema:
          type: string
        example: '{{channelLinkId}}'
        description: The channelLinkId value.
      - name: giftCardProviderProfileLinkId
        in: path
        required: true
        schema:
          type: string
        example: '{{giftCardProviderProfileLinkId}}'
        description: The giftCardProviderProfileLinkId value.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: integer
                    example: 1
              examples:
                exampleFromExisting200:
                  value:
                    amount: 6346
                    giftCardNumber: '6000101001050148'
      tags:
      - Gift Cards
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                number:
                  type: string
                  format: color
                  example: string
                verificationCode:
                  type: string
                  format: utc-millisec
                  example: string
            example:
              number: ABC
              verificationCode: '1234'
      operationId: post_giftcards_channel_channellinkid_profilelink_giftcardproviderprofilelinkid_getgiftcardbalance
      description: Deliverect Get Balance
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
