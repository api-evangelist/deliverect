                  value: "{\n  \"account\": \"{{account_id}}\",\n  \"location\": \"{{location_id}}\",\n  \"tags\": [\n    1,\n    2,\n    3\n  ],\n  \"snoozeStart\": \"YYYY-MM-DDThh:mm:ss.sssZ\",\n  \"\
