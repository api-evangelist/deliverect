        delay: 0
        dispatcher: FALLBACK
  /products/snoozeByTags:
    post:
      tags:
      - Products
      summary: Deliverect Mark Products Out of Stock by Tag
      description: 'Mark products out of stock for a certain amount of time based on their tag and location. You can use the same call to unsnooze product passing `snoozeEnd` time in the past. ##### NOTE
        Please note, that here and later all dates and times, coming from/to Deliverect are UTC.'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                account:
                  type: string
                  example: string
                location:
                  type: string
                  example: string
                tag:
                  type: array
                  items:
                    type: integer
                    example: 1
                snoozeStart:
                  type: string
                  example: string
                snoozeEnd:
                  type: string
                  example: string
              required:
              - account
              - snoozeEnd
              - snoozeStart
              - tag
              - location
            examples:
              Multiple tags for all locations:
                summary: Multiple tags for all locations
                value:
                  account: '{{account_id}}'
                  location: null
                  tags:
                  - 1
                  - 2
                  - 3
                  snoozeStart: YYYY-MM-DDThh:mm:ss.sssZ
                  snoozeEnd: YYYY-MM-DDThh:mm:ss.sssZ
              Multiple tag for one location:
                summary: Multiple tag for one location
                value:
                  account: '{{account_id}}'
                  location: '{{location_id}}'
                  tags:
                  - 1
                  - 2
                  - 3
                  snoozeStart: YYYY-MM-DDThh:mm:ss.sssZ
                  snoozeEnd: YYYY-MM-DDThh:mm:ss.sssZ
              Single tag for all locations:
                summary: Single tag for all locations
                value:
                  account: '{{account_id}}'
                  location: null
                  tags:
                  - 1
                  snoozeStart: YYYY-MM-DDThh:mm:ss.sssZ
                  snoozeEnd: YYYY-MM-DDThh:mm:ss.sssZ
              Single tag for one location:
                summary: Single tag for one location
                value:
                  account: '{{account_id}}'
                  location: '{{location_id}}'
                  tags:
                  - 1
                  snoozeStart: YYYY-MM-DDThh:mm:ss.sssZ
                  snoozeEnd: YYYY-MM-DDThh:mm:ss.sssZ
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties: {}
              examples:
                OK:
                  summary: OK
                  value: '{}'
          description: OK
        '400':
          content:
            application/json:
              schema:
                type: object
                properties: {}
              examples:
                Bad Request:
                  summary: Bad Request
                  value: '{}'
          description: Bad Request
        default:
          description: default
          content:
            text/plain:
              schema:
                type: string
              examples:
                example-2:
                  summary: Multiple tags for all locations
                  value: "{\n  \"account\": \"{{account_id}}\",\n  \"location\": null,\n  \"tags\": [\n    1,\n    2,\n    3\n  ],\n  \"snoozeStart\": \"YYYY-MM-DDThh:mm:ss.sssZ\",\n  \"snoozeEnd\": \"\
                    YYYY-MM-DDThh:mm:ss.sssZ\"\n}"
                example-3:
                  summary: Multiple tag for one location
                  value: "{\n  \"account\": \"{{account_id}}\",\n  \"location\": null,\n  \"tags\": [\n    1\n  ],\n  \"snoozeStart\": \"YYYY-MM-DDThh:mm:ss.sssZ\",\n  \"snoozeEnd\": \"YYYY-MM-DDThh:mm:ss.sssZ\"\
                    \n}"
