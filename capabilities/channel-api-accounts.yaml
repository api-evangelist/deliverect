naftiko: 1.0.0-alpha2
info:
  label: Deliverect Channel API — Accounts
  description: 'Accounts surface of the Deliverect Channel API. 1 operations. Lead operation: Get_accounts. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - Channel
  - Accounts
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: channel-api-accounts
    baseUri: https://api.deliverect.com
    description: Deliverect Channel API — Accounts business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: accounts
      path: /accounts
      operations:
      - name: get_accounts
        method: GET
        description: Deliverect Get_accounts
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: channel-api-accounts-rest
    port: 8080
    description: REST adapter for Deliverect Channel API — Accounts. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/accounts
      name: accounts
      description: REST surface for accounts.
      operations:
      - method: GET
        name: get_accounts
        description: Deliverect Get_accounts
        call: channel-api-accounts.get_accounts
        with: {}
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: channel-api-accounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect Channel API — Accounts. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: get-accounts
      description: Deliverect Get_accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: channel-api-accounts.get_accounts
      with: {}
      outputParameters:
      - type: object
        mapping: $.
