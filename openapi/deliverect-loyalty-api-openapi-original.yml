                    providerId: '83885'
                    firstName: John
                    lastName: Doe
                    email: john.doe@email.com
                    phoneNumber: '+32411222333'
                    dateOfBirth: '1970-01-01T00:00:00.000000+00:00'
                    lifetimePointsBalance: 0
                    status: active
                    tier:
                      name: Bronze
                      description: This is a bronze tier
                      media:
                        url: https://deliverect.com/image.png
                        mediaType: image
                        requirements:
                          minLifetimePoints: 0
