              Cancel Order:
                summary: Cancel Order
                value:
                  channelOrderId: '{{channelOrderId}}'
                  channelOrderDisplayId: '{{channelOrderDisplayId}}'
                  cancellationReason: CANCELLATION
                  status: 100
      responses:
        '200':
          description: Successful response
        '201':
          content:
            application/json:
              schema:
                type: object
                properties: {}
              examples:
                Created:
                  summary: Created
                  value: '{}'
          description: Created
        '400':
          content:
            application/json:
              schema:
                type: object
                properties: {}
              examples:
                Bad Request:
                  summary: Bad Request
                  value:
                    orderFieldsErrors:
                      channelOrderId: Missing from the payload.
                      channelOrderDisplayId: Missing from the payload.
                      items: Missing from the payload.
                      decimalDigits: Missing from the payload.
                    orderPaymentErrors:
                      amount: Missing from the payload.
                      type: Missing from the payload.
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                type: object
                properties: {}
              examples:
                Unauthorized:
                  summary: Unauthorized
                  value:
                    code: token_expired
                    description: token is expired
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                type: object
                properties: {}
              examples:
                Not Found:
                  summary: Not Found
                  value:
                    message: The requested URL was not found on the server. If you entered the URL manually please check your spelling and try again.
          description: Not Found
        '500':
          content:
            application/json:
              schema:
                type: object
                properties: {}
              examples:
                Internal Server Error:
                  summary: Internal Server Error
                  value:
                    error:
                      code: internal_server_error
                      message: Internal server error
          description: Internal Server Error
      tags:
      - Orders
      x-microcks-operation:
