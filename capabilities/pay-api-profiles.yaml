naftiko: 1.0.0-alpha2
info:
  label: Deliverect Pay API — Profiles
  description: 'Profiles surface of the Deliverect Pay API. 2 operations. Lead operation: Register Profile. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - Pay
  - Profiles
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: pay-api-profiles
    baseUri: https://api.deliverect.com
    description: Deliverect Pay API — Profiles business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: register
      path: /register
      operations:
      - name: payplatform_payments_profile_register
        method: POST
        description: Deliverect Register Profile
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: unregister-profile
      path: /unregister-profile
      operations:
      - name: payplatform_payments_unregister_profile
        method: POST
        description: Deliverect Unregister Profile Event
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: pay-api-profiles-rest
    port: 8080
    description: REST adapter for Deliverect Pay API — Profiles. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/register
      name: register
      description: REST surface for register.
      operations:
      - method: POST
        name: payplatform_payments_profile_register
        description: Deliverect Register Profile
        call: pay-api-profiles.payplatform_payments_profile_register
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/unregister-profile
      name: unregister-profile
      description: REST surface for unregister-profile.
      operations:
      - method: POST
        name: payplatform_payments_unregister_profile
        description: Deliverect Unregister Profile Event
        call: pay-api-profiles.payplatform_payments_unregister_profile
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pay-api-profiles-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect Pay API — Profiles. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: register-profile
      description: Deliverect Register Profile
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pay-api-profiles.payplatform_payments_profile_register
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: unregister-profile-event
      description: Deliverect Unregister Profile Event
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pay-api-profiles.payplatform_payments_unregister_profile
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
