                    - plu: RICE-01
                      name: White Rice
                      price: 450
                      quantity: 1
                      subItems:
                      - plu: SAUCE-01
                        name: Sate Sauce
                        price: 50
                        quantity: 2
                        subItems: []
                  includeCutlery: false
                  table: ''
                  orderIsAlreadyPaid: true
                  note: ''
                  numberOfCustomers: 1
                  customer:
                    name: Jane
                    companyName: Doe
                    phoneNumber: 0618776767
                    phoneAccessCode: '5040'
                    email: test@test.com
                    tin: '1234'
                    note: call once you arrive
                  deliveryCost: 300
                  deliveryCostTax: 0
