apis:
  - aid: deliverect:pos-api
    name: Deliverect POS API
    description: >-
      Lets POS systems receive and manage orders and catalogues and track
      real-time sales across delivery and ordering channels routed through
      Deliverect. Uses OAuth machine-to-machine access tokens with the
      genericPOS scope. An OpenAPI specification and Postman collection are
      available.
    humanURL: https://developers.deliverect.com/reference/pos_endpoints
    tags:
      - Point of Sale
      - Orders
      - Menu
    properties:
      - type: Documentation
        url: https://developers.deliverect.com/reference/pos_endpoints
      - type: Authentication
        url: https://developers.deliverect.com/docs/getting-started
      - type: GettingStarted
        url: https://developers.deliverect.com/reference/get-started
  - aid: deliverect:commerce-api
    name: Deliverect Commerce API
    description: >-
      Enables partners to integrate online ordering, click and collect, and
      kiosk channels with Deliverect's commerce layer. Authenticates with
      machine-to-machine access tokens using the genericCommerce scope.
    humanURL: https://developers.deliverect.com/reference/commerce-channel-api
    tags:
      - Online Ordering
      - Commerce
      - Kiosk
    properties:
      - type: Documentation
        url: https://developers.deliverect.com/reference/commerce-channel-api
      - type: Authentication
        url: https://developers.deliverect.com/docs/getting-started
  - aid: deliverect:channel-api
    name: Deliverect Channel API
    description: >-
      Allows ordering channels and marketplaces to integrate online ordering
      and fulfillment with Deliverect, sending orders and syncing menus.
      Authenticates with machine-to-machine access tokens scoped via
      genericChannel.
    humanURL: https://developers.deliverect.com/reference
    tags:
      - Channels
      - Orders
      - Fulfillment
    properties:
      - type: Documentation
        url: https://developers.deliverect.com/reference
      - type: Authentication
        url: https://developers.deliverect.com/docs/getting-started
