                    coordinates:
                      latitude: 51.51942
                      longitude: -0.07771
                    verification:
                      pincode: '1234'
                  deliveryInfo:
                    packageSize: small
                    transportType: bicycle
                  decimalDigits: 2
                  payment:
                    amount: 1800
                    type: 0
                    due: 0
                  taxes: []
                  taxRemitted: 0
                  items:
                  - plu: P-SATE
                    name: Chicken Sate
                    price: 450
                    quantity: 1
                    remark: well done
                    discountReferenceIds:
                    - 1
                    subItems:
                    - plu: RICE-01
                      name: White Rice
                      price: 450
                      quantity: 1
                      subItems:
                      - plu: SAUCE-01
                        name: Sate Sauce
                        price: 50
