        name: post_loyalty_channellinkid_compensationcards_validate
        description: Deliverect Post_loyalty_channellinkid_compensationcards_validate
        call: loyalty-api-compensation-cards.post_loyalty_channellinkid_compensationcards_validate
        with:
          channelLinkId: rest.channelLinkId
        outputParameters:
        - type: object
          mapping: $.
