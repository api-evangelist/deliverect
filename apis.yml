aid: deliverect
name: Deliverect
description: >-
  Deliverect is a global restaurant integration platform that connects delivery
  marketplaces, online ordering channels, POS systems, and store operations into
  a single hub serving over 80,000 locations across more than 50 markets. For
  developers and integration partners, Deliverect exposes a suite of REST APIs
  documented in its Developer Hub, including the POS API, Commerce API, Channel
  API, Dispatch API, and Store API. The APIs let partners receive and manage
  orders and catalogues, build online ordering and kiosk channels, manage
  last-mile dispatch, and control stock, hours, and availability. Authentication
  uses machine-to-machine access tokens with client_id and client_secret
  credentials issued after an API agreement, scoped by integration type.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
