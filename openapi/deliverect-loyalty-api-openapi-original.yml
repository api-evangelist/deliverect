        content:
          application/json:
            schema:
              type: object
              required:
              - order
              properties:
                order:
                  type: object
                  description: For the full order schema, please refer to [Glossary - Channel Orders](https://developers.deliverect.com/page/glossary-channel-orders)
                  properties:
                    orderType:
                      type: integer
                      description: The type of the order (Pickup, Delivery, Eat-in)
                      format: int32
                      example: 1
                    items:
                      type: object
                      properties:
                        plu:
                          type: string
                          example: PIE1
                        name:
                          type: string
                          example: Deliverect's Pizza Place
                        price:
                          type: integer
                          format: int32
                          example: 1250
                        quantity:
                          type: integer
                          format: int32
                          example: 1
                        subItems:
                          type: object
                          properties: {}
                    customer:
                      type: object
                      properties:
                        email:
                          type: string
                          example: customer@example.com
                        phoneNumber:
                          type: string
                          example: '+15555550123'
                        name:
                          type: string
                          example: Deliverect's Pizza Place
                    decimalDigits:
                      type: integer
                      description: number of decimal for the order currency
                      format: int32
                      example: 1
                    subTotal:
                      type: integer
                      format: int32
                      example: 1250
                    payment:
                      type: object
                      properties:
                        amount:
                          type: integer
                          format: int32
                          example: 1250
