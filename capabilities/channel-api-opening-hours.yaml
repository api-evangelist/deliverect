naftiko: 1.0.0-alpha2
info:
  label: Deliverect Channel API — Opening Hours
  description: 'Opening Hours surface of the Deliverect Channel API. 1 operations. Lead operation: Get_locations_channels_locationid_holidays. Self-contained Naftiko capability covering one Deliverect business
    surface.'
  tags:
  - Deliverect
  - Channel
  - Opening Hours
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: channel-api-opening-hours
    baseUri: https://api.deliverect.com
    description: Deliverect Channel API — Opening Hours business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: locations-channels-location-id-holidays
      path: /locations/channels/{locationId}/holidays
      operations:
      - name: get_locations_channels_locationid_holidays
        method: GET
        description: Deliverect Get_locations_channels_locationid_holidays
        inputParameters:
        - name: locationId
          in: path
          type: string
          required: true
          description: Unique location Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: channel-api-opening-hours-rest
    port: 8080
    description: REST adapter for Deliverect Channel API — Opening Hours. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/locations/channels/{location-id}/holidays
      name: locations-channels-location-id-holidays
      description: REST surface for locations-channels-location-id-holidays.
      operations:
      - method: GET
        name: get_locations_channels_locationid_holidays
        description: Deliverect Get_locations_channels_locationid_holidays
        call: channel-api-opening-hours.get_locations_channels_locationid_holidays
        with:
          locationId: rest.locationId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: channel-api-opening-hours-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect Channel API — Opening Hours. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: get-locations-channels-locationid-holidays
      description: Deliverect Get_locations_channels_locationid_holidays
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: channel-api-opening-hours.get_locations_channels_locationid_holidays
      with:
        locationId: tools.locationId
      outputParameters:
      - type: object
        mapping: $.
