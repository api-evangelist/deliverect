naftiko: 1.0.0-alpha2
info:
  label: Deliverect CRM API — Orders
  description: 'Orders surface of the Deliverect CRM API. 3 operations. Lead operation: Customer Order History. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - CRM
  - Orders
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: crm-api-orders
    baseUri: https://api.deliverect.com
    description: Deliverect CRM API — Orders business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: crm-account-id-customers-crm-profile-id-orders
      path: /crm/{accountId}/customers/{crmProfileId}/orders
      operations:
      - name: get_crm_accountid_customers_crmprofileid_orders
        method: GET
        description: Deliverect Customer Order History
        inputParameters:
        - name: crmProfileId
          in: path
          type: string
          required: true
          description: The crmProfileId value.
        - name: accountId
          in: path
          type: string
          required: true
          description: The accountId value.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: crm-account-id-orders-crm-order-id
      path: /crm/{accountId}/orders/{crmOrderId}
      operations:
      - name: get_crm_accountid_orders_crmorderid
        method: GET
        description: Deliverect CRM Order
        inputParameters:
        - name: crmOrderId
          in: path
          type: string
          required: true
          description: The crmOrderId value.
        - name: accountId
          in: path
          type: string
          required: true
          description: The accountId value.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: crm-account-id-customers-crm-profile-id-orders-favorites
      path: /crm/{accountId}/customers/{crmProfileId}/orders/favorites
      operations:
      - name: get_crm_accountid_customers_crmprofileid_orders_favorites
        method: GET
        description: Deliverect Customer Favorite Orders
        inputParameters:
        - name: crmProfileId
          in: path
          type: string
          required: true
          description: The crmProfileId value.
        - name: accountId
          in: path
          type: string
          required: true
          description: The accountId value.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: crm-api-orders-rest
    port: 8080
    description: REST adapter for Deliverect CRM API — Orders. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/crm/{account-id}/customers/{crm-profile-id}/orders
      name: crm-account-id-customers-crm-profile-id-orders
      description: REST surface for crm-account-id-customers-crm-profile-id-orders.
      operations:
      - method: GET
        name: get_crm_accountid_customers_crmprofileid_orders
        description: Deliverect Customer Order History
        call: crm-api-orders.get_crm_accountid_customers_crmprofileid_orders
        with:
          crmProfileId: rest.crmProfileId
          accountId: rest.accountId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/crm/{account-id}/orders/{crm-order-id}
      name: crm-account-id-orders-crm-order-id
      description: REST surface for crm-account-id-orders-crm-order-id.
      operations:
      - method: GET
        name: get_crm_accountid_orders_crmorderid
        description: Deliverect CRM Order
        call: crm-api-orders.get_crm_accountid_orders_crmorderid
        with:
          crmOrderId: rest.crmOrderId
          accountId: rest.accountId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/crm/{account-id}/customers/{crm-profile-id}/orders/favorites
      name: crm-account-id-customers-crm-profile-id-orders-favorites
      description: REST surface for crm-account-id-customers-crm-profile-id-orders-favorites.
      operations:
      - method: GET
        name: get_crm_accountid_customers_crmprofileid_orders_favorites
        description: Deliverect Customer Favorite Orders
        call: crm-api-orders.get_crm_accountid_customers_crmprofileid_orders_favorites
        with:
          crmProfileId: rest.crmProfileId
          accountId: rest.accountId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: crm-api-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect CRM API — Orders. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: customer-order-history
      description: Deliverect Customer Order History
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: crm-api-orders.get_crm_accountid_customers_crmprofileid_orders
      with:
        crmProfileId: tools.crmProfileId
        accountId: tools.accountId
      outputParameters:
      - type: object
        mapping: $.
    - name: crm-order
      description: Deliverect CRM Order
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: crm-api-orders.get_crm_accountid_orders_crmorderid
      with:
        crmOrderId: tools.crmOrderId
        accountId: tools.accountId
      outputParameters:
      - type: object
        mapping: $.
    - name: customer-favorite-orders
      description: Deliverect Customer Favorite Orders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: crm-api-orders.get_crm_accountid_customers_crmprofileid_orders_favorites
      with:
        crmProfileId: tools.crmProfileId
        accountId: tools.accountId
      outputParameters:
      - type: object
        mapping: $.
