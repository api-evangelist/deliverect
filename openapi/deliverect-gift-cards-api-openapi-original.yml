  /giftCards/registerProfile:
    post:
      summary: Deliverect Register Profile
      description: Deliverect Register Profile
      operationId: giftcards_registerprofile
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - account
              - apiKey
              properties:
                account:
                  type: string
                  example: string
                apiKey:
                  type: string
                  description: API key is the unique identifier of the customer within the gift cards gateway
                  example: string
            examples:
              giftcards_registerprofileRequest:
                summary: Default giftcards_registerprofile request
                x-microcks-default: true
                value:
                  account: string
                  apiKey: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value:
                    redeemGiftCardURL: https://yourwebhook.com/redeem
                    revertRedeemGiftCardURL: 'https: //yourwebhook.com/reverse'
                    getGiftCardBalanceURL: https://yourwebhook.com/balance
              schema:
                type: object
                properties:
                  redeemGiftCardURL:
