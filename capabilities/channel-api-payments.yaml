naftiko: 1.0.0-alpha2
info:
  label: Deliverect Channel API — Payments
  description: 'Payments surface of the Deliverect Channel API. 1 operations. Lead operation: Payment Update. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - Channel
  - Payments
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: channel-api-payments
    baseUri: https://api.deliverect.com
    description: Deliverect Channel API — Payments business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: channel-payment-update
      path: /channel/payment_update
      operations:
      - name: channel_payment_update
        method: POST
        description: Deliverect Payment Update
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: channel-api-payments-rest
    port: 8080
    description: REST adapter for Deliverect Channel API — Payments. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/channel/payment-update
      name: channel-payment-update
      description: REST surface for channel-payment-update.
      operations:
      - method: POST
        name: channel_payment_update
        description: Deliverect Payment Update
        call: channel-api-payments.channel_payment_update
        with: {}
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: channel-api-payments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect Channel API — Payments. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: payment-update
      description: Deliverect Payment Update
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: channel-api-payments.channel_payment_update
      with: {}
      outputParameters:
      - type: object
        mapping: $.
