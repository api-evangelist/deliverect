naftiko: 1.0.0-alpha2
info:
  label: Deliverect Store API — Allergens
  description: 'Allergens surface of the Deliverect Store API. 1 operations. Lead operation: Allergens and Tags. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - Store
  - Allergens
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: store-api-allergens
    baseUri: https://api.deliverect.com
    description: Deliverect Store API — Allergens business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: all-allegens
      path: /allAllegens
      operations:
      - name: get_allallegens
        method: GET
        description: Deliverect Allergens and Tags
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: store-api-allergens-rest
    port: 8080
    description: REST adapter for Deliverect Store API — Allergens. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/all-allegens
      name: all-allegens
      description: REST surface for all-allegens.
      operations:
      - method: GET
        name: get_allallegens
        description: Deliverect Allergens and Tags
        call: store-api-allergens.get_allallegens
        with: {}
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: store-api-allergens-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect Store API — Allergens. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: allergens-tags
      description: Deliverect Allergens and Tags
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: store-api-allergens.get_allallegens
      with: {}
      outputParameters:
      - type: object
        mapping: $.
