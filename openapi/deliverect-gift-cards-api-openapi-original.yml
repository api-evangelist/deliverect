openapi: 3.1.0
info:
  title: Deliverect Gift Cards API
  description: Redeem gift cards, check balances, apply and reverse gift cards, and register gift card provider profiles for ordering channels. Authenticates with OAuth 2.0 machine-to-machine access tokens.
  version: '1.0'
  x-generated-from: documentation
  x-source-url: https://developers.deliverect.com/reference
  x-last-validated: '2026-06-02'
  contact:
    name: Kin Lane
    email: kin@apievangelist.com
  license:
    name: All Rights Reserved
servers:
- url: https://api.deliverect.com
  description: Production
- url: https://api.staging.deliverect.com
  description: Staging
tags:
- name: Gift Cards
  description: Gift Cards operations for the Deliverect Gift Cards API.
- name: Profiles
  description: Profiles operations for the Deliverect Gift Cards API.
paths:
  /giftCards/channel/{channelLinkId}/profileLink/{giftCardProviderProfileLinkId}/applyGiftCard:
    post:
      summary: Deliverect Apply Gift Card
      parameters:
      - name: channelLinkId
        in: path
        required: true
        schema:
          type: string
        example: '{{channelLinkId}}'
        description: The channelLinkId value.
      - name: giftCardProviderProfileLinkId
        in: path
        required: true
        schema:
          type: string
        example: '{{giftCardProviderProfileLinkId}}'
        description: The giftCardProviderProfileLinkId value.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: integer
                    example: 1
              examples:
                post_giftcards_channel_channellinkid_profilelink_giftcardproviderprofilelinkid_applygiftcard200Example:
                  summary: Default post_giftcards_channel_channellinkid_profilelink_giftcardproviderprofilelinkid_applygiftcard 200 response
                  x-microcks-default: true
                  value:
                    balance: 1
      tags:
      - Gift Cards
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                number:
                  type: string
                  format: color
                  example: string
                verificationCode:
                  type: string
                  format: utc-millisec
                  example: string
                amount:
                  type: integer
                  example: 1250
            example:
              number: ABC
              verificationCode: '1234'
              amount: 100
      operationId: post_giftcards_channel_channellinkid_profilelink_giftcardproviderprofilelinkid_applygiftcard
      description: Deliverect Apply Gift Card
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
