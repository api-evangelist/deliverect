naftiko: 1.0.0-alpha2
info:
  label: Deliverect Commerce API — Stores
  description: 'Stores surface of the Deliverect Commerce API. 2 operations. Lead operation: Get Store. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - Commerce
  - Stores
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: commerce-api-stores
    baseUri: https://api.deliverect.com
    description: Deliverect Commerce API — Stores business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: commerce-account-id-stores-channel-link-id
      path: /commerce/{accountId}/stores/{channelLinkId}
      operations:
      - name: commerce_channel_api_stores_get_store
        method: GET
        description: Deliverect Get Store
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
          description: The accountId value.
        - name: channelLinkId
          in: path
          type: string
          required: true
          description: The channelLinkId value.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: commerce-account-id-stores
      path: /commerce/{accountId}/stores
      operations:
      - name: commerce_channel_api_stores_get_stores
        method: GET
        description: Deliverect Get Stores
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
          description: The accountId value.
        - name: page
          in: query
          type: integer
          required: false
          description: Page to be returned
        - name: size
          in: query
          type: integer
          required: false
          description: 'Number of stores to be returned per page - Max: 100'
        - name: latitude
          in: query
          type: number
          required: false
          description: Reference latitude coordinate to calculate store distance
        - name: longitude
          in: query
          type: number
          required: false
          description: Reference longitude coordinate to calculate store distance
        - name: sort
          in: query
          type: string
          required: false
          description: The sort value.
        - name: fulfillmentType
          in: query
          type: string
          required: false
          description: 'Fulfillment type(s) available on the channelLink. e.g: delivery,eatIn'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: commerce-api-stores-rest
    port: 8080
    description: REST adapter for Deliverect Commerce API — Stores. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/commerce/{account-id}/stores/{channel-link-id}
      name: commerce-account-id-stores-channel-link-id
      description: REST surface for commerce-account-id-stores-channel-link-id.
      operations:
      - method: GET
        name: commerce_channel_api_stores_get_store
        description: Deliverect Get Store
        call: commerce-api-stores.commerce_channel_api_stores_get_store
        with:
          accountId: rest.accountId
          channelLinkId: rest.channelLinkId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/commerce/{account-id}/stores
      name: commerce-account-id-stores
      description: REST surface for commerce-account-id-stores.
      operations:
      - method: GET
        name: commerce_channel_api_stores_get_stores
        description: Deliverect Get Stores
        call: commerce-api-stores.commerce_channel_api_stores_get_stores
        with:
          accountId: rest.accountId
          page: rest.page
          size: rest.size
          latitude: rest.latitude
          longitude: rest.longitude
          sort: rest.sort
          fulfillmentType: rest.fulfillmentType
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: commerce-api-stores-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect Commerce API — Stores. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: get-store
      description: Deliverect Get Store
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: commerce-api-stores.commerce_channel_api_stores_get_store
      with:
        accountId: tools.accountId
        channelLinkId: tools.channelLinkId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-stores
      description: Deliverect Get Stores
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: commerce-api-stores.commerce_channel_api_stores_get_stores
      with:
        accountId: tools.accountId
        page: tools.page
        size: tools.size
        latitude: tools.latitude
        longitude: tools.longitude
        sort: tools.sort
        fulfillmentType: tools.fulfillmentType
      outputParameters:
      - type: object
        mapping: $.
