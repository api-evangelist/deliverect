  /channel/snooze:
    post:
      summary: Deliverect Snooze / Unsnooze Products
      description: Webhook events will be sent when items are snoozed or unsnoozed
      operationId: channel_snooze
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                accountId:
                  type: string
                  example: 5b****71c6489f0029****d4
                locationId:
                  type: string
                  example: 5c****ecc6489f0001****b8
                channelLinkId:
                  type: string
                  example: 5e****abc11dec0001****9b
                operations:
                  type: array
                  items:
                    type: object
                    properties:
                      action:
                        type: string
                        example: snooze
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              properties:
                                plu:
                                  type: string
                                  example: PIE1
                                snoozeStart:
                                  type: string
                                  format: date-time
                                  example: '2020-03-24T16:21:54.955000Z'
                                snoozeEnd:
                                  type: string
                                  format: date-time
                                  example: '2020-03-24T22:21:54.955000Z'
                      allSnoozedItems:
                        type: array
                        items:
                          type: object
                          properties:
                            plu:
                              type: string
                              example: PIE1
                            snoozeStart:
                              type: string
                              format: date-time
                              example: '2020-03-24T16:21:54.955000Z'
                            snoozeEnd:
                              type: string
                              format: date-time
                              example: '2020-03-24T22:21:54.955000Z'
            examples:
              channel_snooze_request:
                summary: Default channel_snooze request
                x-microcks-default: true
                value:
                  accountId: 5b****71c6489f0029****d4
                  locationId: 5c****ecc6489f0001****b8
                  channelLinkId: 5e****abc11dec0001****9b
                  operations:
                  - action: snooze
                    data:
                      items:
                      - plu: PIE1
                        snoozeStart: '2020-03-24T16:21:54.955000Z'
                        snoozeEnd: '2020-03-24T22:21:54.955000Z'
                    allSnoozedItems:
                    - plu: PIE1
                      snoozeStart: '2020-03-24T16:21:54.955000Z'
                      snoozeEnd: '2020-03-24T22:21:54.955000Z'
                    - plu: MSB1
                      snoozeStart: '2020-03-24T16:21:54.955000Z'
                      snoozeEnd: '2020-03-24T22:21:54.955000Z'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                type: object
                properties: {}
      deprecated: false
      tags:
      - Products
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
