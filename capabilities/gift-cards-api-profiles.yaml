naftiko: 1.0.0-alpha2
info:
  label: Deliverect Gift Cards API — Profiles
  description: 'Profiles surface of the Deliverect Gift Cards API. 2 operations. Lead operation: Register Profile. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - Gift Cards
  - Profiles
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: gift-cards-api-profiles
    baseUri: https://api.deliverect.com
    description: Deliverect Gift Cards API — Profiles business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: gift-cards-register-profile
      path: /giftCards/registerProfile
      operations:
      - name: giftcards_registerprofile
        method: POST
        description: Deliverect Register Profile
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: gift-cards-channel-channel-link-id-provider-profile-links
      path: /giftCards/channel/{channelLinkId}/providerProfileLinks
      operations:
      - name: get_giftcards_channel_channellinkid_providerprofilelinks
        method: GET
        description: Deliverect Get Profile Links
        inputParameters:
        - name: channelLinkId
          in: path
          type: string
          required: true
          description: The channelLinkId value.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: gift-cards-api-profiles-rest
    port: 8080
    description: REST adapter for Deliverect Gift Cards API — Profiles. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/gift-cards/register-profile
      name: gift-cards-register-profile
      description: REST surface for gift-cards-register-profile.
      operations:
      - method: POST
        name: giftcards_registerprofile
        description: Deliverect Register Profile
        call: gift-cards-api-profiles.giftcards_registerprofile
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/gift-cards/channel/{channel-link-id}/provider-profile-links
      name: gift-cards-channel-channel-link-id-provider-profile-links
      description: REST surface for gift-cards-channel-channel-link-id-provider-profile-links.
      operations:
      - method: GET
        name: get_giftcards_channel_channellinkid_providerprofilelinks
        description: Deliverect Get Profile Links
        call: gift-cards-api-profiles.get_giftcards_channel_channellinkid_providerprofilelinks
        with:
          channelLinkId: rest.channelLinkId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gift-cards-api-profiles-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect Gift Cards API — Profiles. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: register-profile
      description: Deliverect Register Profile
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gift-cards-api-profiles.giftcards_registerprofile
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-profile-links
      description: Deliverect Get Profile Links
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gift-cards-api-profiles.get_giftcards_channel_channellinkid_providerprofilelinks
      with:
        channelLinkId: tools.channelLinkId
      outputParameters:
      - type: object
        mapping: $.
