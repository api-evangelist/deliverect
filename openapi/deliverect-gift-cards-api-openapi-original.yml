  /giftCards/channel/{channelLinkId}/providerProfileLinks:
    get:
      summary: Deliverect Get Profile Links
      parameters:
      - name: channelLinkId
        in: path
        required: true
        schema:
          type: string
        example: '{{channelLinkId}}'
        description: The channelLinkId value.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  giftCardProviderProfileLinks:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: 609a1b2c3d4e5f6a7b8c9d0e
                        name:
                          type: string
                          example: Deliverect's Pizza Place
              examples:
