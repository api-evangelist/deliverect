naftiko: 1.0.0-alpha2
info:
  label: Deliverect Channel API — Registration
  description: 'Registration surface of the Deliverect Channel API. 1 operations. Lead operation: Channel Registration. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - Channel
  - Registration
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: channel-api-registration
    baseUri: https://api.deliverect.com
    description: Deliverect Channel API — Registration business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: channel-register
      path: /channel/register
      operations:
      - name: channel_register
        method: POST
        description: Deliverect Channel Registration
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: channel-api-registration-rest
    port: 8080
    description: REST adapter for Deliverect Channel API — Registration. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/channel/register
      name: channel-register
      description: REST surface for channel-register.
      operations:
      - method: POST
        name: channel_register
        description: Deliverect Channel Registration
        call: channel-api-registration.channel_register
        with: {}
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: channel-api-registration-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect Channel API — Registration. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: channel-registration
      description: Deliverect Channel Registration
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: channel-api-registration.channel_register
      with: {}
      outputParameters:
      - type: object
        mapping: $.
