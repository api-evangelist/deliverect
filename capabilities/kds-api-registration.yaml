naftiko: 1.0.0-alpha2
info:
  label: Deliverect KDS API — Registration
  description: 'Registration surface of the Deliverect KDS API. 1 operations. Lead operation: Kds_register_kds. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - KDS
  - Registration
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: kds-api-registration
    baseUri: https://api.deliverect.com
    description: Deliverect KDS API — Registration business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: kds-register-kds
      path: /kds/register_kds
      operations:
      - name: kds_register_kds
        method: POST
        description: Deliverect Kds_register_kds
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: kds-api-registration-rest
    port: 8080
    description: REST adapter for Deliverect KDS API — Registration. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/kds/register-kds
      name: kds-register-kds
      description: REST surface for kds-register-kds.
      operations:
      - method: POST
        name: kds_register_kds
        description: Deliverect Kds_register_kds
        call: kds-api-registration.kds_register_kds
        with: {}
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kds-api-registration-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect KDS API — Registration. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: kds-register-kds
      description: Deliverect Kds_register_kds
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: kds-api-registration.kds_register_kds
      with: {}
      outputParameters:
      - type: object
        mapping: $.
