                      type: string
                      example: '+32411222333'
                    dateOfBirth:
                      type: string
                      example: '1970-01-01T00:00:00.000000+00:00'
                    lifetimePointsBalance:
                      type: integer
                      example: 0
                      default: 0
                    status:
                      type: string
                      example: activation_pending
                    tier: {}
                    providerId:
                      type: string
                  required:
                  - providerId
                - title: with tier
                  type: object
                  properties:
                    firstName:
                      type: string
                      example: John
                    lastName:
                      type: string
                      example: Doe
                    email:
                      type: string
                      example: john.doe@email.com
                    phoneNumber:
                      type: string
                      example: '+32411222333'
                    dateOfBirth:
                      type: string
                      example: '1970-01-01T00:00:00.000000+00:00'
                    lifetimePointsBalance:
                      type: integer
                      example: 0
                      default: 0
                    status:
                      type: string
                      example: active
                    tier:
                      type: object
                      properties:
                        name:
                          type: string
                          example: Bronze
                        description:
                          type: string
                          example: This is a bronze tier
                        media:
                          type: object
                          properties:
                            url:
                              type: string
                              example: https://deliverect.com/image.png
                            mediaType:
                              type: string
                              example: image
                            requirements:
                              type: object
                              properties:
                                minLifetimePoints:
                                  type: integer
                                  example: 0
                                  default: 0
                                maxLifetimePoints:
                                  type: integer
                                  example: 1000
                                  default: 0
                    providerId:
                      type: string
                  required:
                  - providerId
        '400':
          description: '400'
          content:
            application/json:
              examples:
                Result:
                  value: "{\n    \"error\": \"no active loyalty profile found\",\n    \"http_code\": 400,\n    \"description\": \"no active loyalty profile found\"\n}"
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: no active loyalty profile found
                  http_code:
                    type: integer
                    example: 400
                    default: 0
                  description:
                    type: string
                    example: no active loyalty profile found
