naftiko: 1.0.0-alpha2
info:
  label: Deliverect POS API — Products
  description: 'Products surface of the Deliverect POS API. 4 operations. Lead operation: Sync Products. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - POS
  - Products
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: pos-api-products
    baseUri: https://api.deliverect.com
    description: Deliverect POS API — Products business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: sync-products
      path: /syncProducts
      operations:
      - name: pos_syncproducts
        method: GET
        description: Deliverect Sync Products
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-locations-location-id-sync-products
      path: /v2/locations/{locationId}/syncProducts
      operations:
      - name: get_v2_locations_locationid_syncproducts
        method: GET
        description: Deliverect Get_v2_locations_locationid_syncproducts
        inputParameters:
        - name: locationId
          in: path
          type: string
          required: true
          description: The unique identifier of the location to sync products for.
        - name: forceUpdate
          in: query
          type: string
          required: false
          description: When set to `true`, forces a full product sync even if products have not changed since the last sync.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: product-and-categories
      path: /productAndCategories
      operations:
      - name: insertUpdateProductsAndCategories
        method: POST
        description: Deliverect Insert/update Products and Categories
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: product-sync-callback
      path: /product_sync_callback
      operations:
      - name: pos_api_product_sync_callback
        method: POST
        description: Deliverect Asynchronous Insert / Update Products
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: pos-api-products-rest
    port: 8080
    description: REST adapter for Deliverect POS API — Products. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/sync-products
      name: sync-products
      description: REST surface for sync-products.
      operations:
      - method: GET
        name: pos_syncproducts
        description: Deliverect Sync Products
        call: pos-api-products.pos_syncproducts
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/locations/{location-id}/sync-products
      name: v2-locations-location-id-sync-products
      description: REST surface for v2-locations-location-id-sync-products.
      operations:
      - method: GET
        name: get_v2_locations_locationid_syncproducts
        description: Deliverect Get_v2_locations_locationid_syncproducts
        call: pos-api-products.get_v2_locations_locationid_syncproducts
        with:
          locationId: rest.locationId
          forceUpdate: rest.forceUpdate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/product-and-categories
      name: product-and-categories
      description: REST surface for product-and-categories.
      operations:
      - method: POST
        name: insertUpdateProductsAndCategories
        description: Deliverect Insert/update Products and Categories
        call: pos-api-products.insertUpdateProductsAndCategories
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/product-sync-callback
      name: product-sync-callback
      description: REST surface for product-sync-callback.
      operations:
      - method: POST
        name: pos_api_product_sync_callback
        description: Deliverect Asynchronous Insert / Update Products
        call: pos-api-products.pos_api_product_sync_callback
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pos-api-products-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect POS API — Products. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: sync-products
      description: Deliverect Sync Products
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pos-api-products.pos_syncproducts
      with: {}
      outputParameters:
      - type: object
        mapping: $.
    - name: get-v2-locations-locationid-syncproducts
      description: Deliverect Get_v2_locations_locationid_syncproducts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pos-api-products.get_v2_locations_locationid_syncproducts
      with:
        locationId: tools.locationId
        forceUpdate: tools.forceUpdate
      outputParameters:
      - type: object
        mapping: $.
    - name: insert-update-products-categories
      description: Deliverect Insert/update Products and Categories
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pos-api-products.insertUpdateProductsAndCategories
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: asynchronous-insert-update-products
      description: Deliverect Asynchronous Insert / Update Products
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pos-api-products.pos_api_product_sync_callback
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
