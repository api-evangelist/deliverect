naftiko: 1.0.0-alpha2
info:
  label: Deliverect Dispatch API — Fulfillment
  description: 'Fulfillment surface of the Deliverect Dispatch API. 3 operations. Lead operation: Dispatch Availability. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - Dispatch
  - Fulfillment
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: dispatch-api-fulfillment
    baseUri: https://api.deliverect.com
    description: Deliverect Dispatch API — Fulfillment business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: fulfillment-validate
      path: /fulfillment/validate
      operations:
      - name: post_fulfillment_validate
        method: POST
        description: Deliverect Dispatch Availability
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: fulfillment-cancel
      path: /fulfillment/cancel
      operations:
      - name: post_post_fulfillment_cancel
        method: POST
        description: Deliverect Cancel Delivery
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: fulfillment-generic-events
      path: /fulfillment/generic/events
      operations:
      - name: post_post_fulfillment_generic_events
        method: POST
        description: Deliverect Update Delivery
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: dispatch-api-fulfillment-rest
    port: 8080
    description: REST adapter for Deliverect Dispatch API — Fulfillment. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/fulfillment/validate
      name: fulfillment-validate
      description: REST surface for fulfillment-validate.
      operations:
      - method: POST
        name: post_fulfillment_validate
        description: Deliverect Dispatch Availability
        call: dispatch-api-fulfillment.post_fulfillment_validate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fulfillment/cancel
      name: fulfillment-cancel
      description: REST surface for fulfillment-cancel.
      operations:
      - method: POST
        name: post_post_fulfillment_cancel
        description: Deliverect Cancel Delivery
        call: dispatch-api-fulfillment.post_post_fulfillment_cancel
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fulfillment/generic/events
      name: fulfillment-generic-events
      description: REST surface for fulfillment-generic-events.
      operations:
      - method: POST
        name: post_post_fulfillment_generic_events
        description: Deliverect Update Delivery
        call: dispatch-api-fulfillment.post_post_fulfillment_generic_events
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dispatch-api-fulfillment-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect Dispatch API — Fulfillment. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: dispatch-availability
      description: Deliverect Dispatch Availability
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dispatch-api-fulfillment.post_fulfillment_validate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-delivery
      description: Deliverect Cancel Delivery
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dispatch-api-fulfillment.post_post_fulfillment_cancel
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-delivery
      description: Deliverect Update Delivery
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dispatch-api-fulfillment.post_post_fulfillment_generic_events
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
