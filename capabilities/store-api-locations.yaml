naftiko: 1.0.0-alpha2
info:
  label: Deliverect Store API — Locations
  description: 'Locations surface of the Deliverect Store API. 1 operations. Lead operation: Locations. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - Store
  - Locations
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: store-api-locations
    baseUri: https://api.deliverect.com
    description: Deliverect Store API — Locations business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: locations
      path: /locations
      operations:
      - name: get_get_locations
        method: GET
        description: Deliverect Locations
        inputParameters:
        - name: where
          in: query
          type: string
          required: false
          description: The where value.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: store-api-locations-rest
    port: 8080
    description: REST adapter for Deliverect Store API — Locations. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/locations
      name: locations
      description: REST surface for locations.
      operations:
      - method: GET
        name: get_get_locations
        description: Deliverect Locations
        call: store-api-locations.get_get_locations
        with:
          where: rest.where
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: store-api-locations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect Store API — Locations. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: locations
      description: Deliverect Locations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: store-api-locations.get_get_locations
      with:
        where: tools.where
      outputParameters:
      - type: object
        mapping: $.
