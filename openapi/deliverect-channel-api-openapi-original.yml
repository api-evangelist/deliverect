openapi: 3.1.0
info:
  title: Deliverect Channel API
  description: Integrate ordering channels and marketplaces with Deliverect to create and cancel orders, sync menus, snooze products, update store and courier status, and exchange payment events. Authenticates
    with OAuth 2.0 machine-to-machine access tokens scoped via genericChannel.
  version: '1.0'
  x-generated-from: documentation
  x-source-url: https://developers.deliverect.com/reference
  x-last-validated: '2026-06-02'
  contact:
    name: Kin Lane
    email: kin@apievangelist.com
  license:
    name: All Rights Reserved
servers:
- url: https://api.deliverect.com
  description: Production
- url: https://api.staging.deliverect.com
  description: Staging
tags:
- name: Orders
  description: Orders operations for the Deliverect Channel API.
- name: Menus
  description: Menus operations for the Deliverect Channel API.
- name: Products
  description: Products operations for the Deliverect Channel API.
- name: Store Status
  description: Store Status operations for the Deliverect Channel API.
- name: Couriers
  description: Couriers operations for the Deliverect Channel API.
- name: Registration
  description: Registration operations for the Deliverect Channel API.
- name: Payments
  description: Payments operations for the Deliverect Channel API.
- name: Opening Hours
  description: Opening Hours operations for the Deliverect Channel API.
- name: Channel Links
  description: Channel Links operations for the Deliverect Channel API.
- name: Accounts
  description: Accounts operations for the Deliverect Channel API.
paths:
  /{channelName}/order/{channelLinkId}:
    post:
      summary: Deliverect Create / Cancel Order
      description: Create a new order for a linked location.
      operationId: post_channelname_order_channellinkid
      parameters:
      - name: channelName
        in: path
        required: true
        schema:
          type: string
          default: '{channelName}'
        description: A unique scope provided to channel integrators to create orders in authorised locations
        example: '{channelName}'
      - name: channelLinkId
        in: path
        required: true
        schema:
          type: string
          default: '{channelLinkId}'
        description: The unique identifier of the channel in a specific location.
        example: '{channelLinkId}'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                channelOrderId:
                  type: string
                  description: The full unique ID from the ordering channel.
                  example: 609a1b2c3d4e5f6a7b8c9d0e
                channelOrderDisplayId:
                  type: string
                  description: A humanly-readable order reference.
                  example: 609a1b2c3d4e5f6a7b8c9d0e
                validationId:
                  type: string
                  description: Validation ID returned from dispatch validation when used.
                  example: 609a1b2c3d4e5f6a7b8c9d0e
                orderType:
                  type: integer
                  description: Order type. Use 1 for pickup, 2 for delivery, 3 for eat-in, and 4 for curbside.
                  example: 1
                deliveryIsAsap:
                  type: boolean
                  example: true
                pickupTime:
                  type: string
                  example: '2026-03-15T14:30:00Z'
                deliveryTime:
                  type: string
                  example: '2026-03-15T14:30:00Z'
                placedTime:
                  type: string
                  example: '2026-03-15T14:30:00Z'
                courier:
                  type: string
                  description: Who delivers the order.
                  example: string
                ageCheck:
                  type: boolean
                  example: true
                deliveryAddress:
                  type: object
                  properties:
                    street:
                      type: string
                      example: string
                    streetNumber:
                      type: string
                      example: string
                    postalCode:
                      type: string
                      example: string
                    area:
                      type: string
                      example: string
                    city:
                      type: string
                      example: string
                    country:
                      type: string
                      example: BE
                    extraAddressInfo:
                      type: string
                      example: string
                    coordinates:
                      type: object
                      properties:
                        latitude:
                          type: number
                          format: float
                          example: 1.0
                        longitude:
                          type: number
                          format: float
                          example: 1.0
                    verification:
                      type: object
                      properties:
                        pincode:
                          type: string
                          example: string
                deliveryInfo:
                  type: object
                  properties:
                    packageSize:
                      type: string
                      example: string
                    transportType:
                      type: string
                      example: string
                decimalDigits:
                  type: integer
                  example: 1
                payment:
                  type: object
                  properties:
                    amount:
                      type: integer
                      example: 1250
                    type:
                      type: integer
                      example: 1
                    due:
                      type: integer
                      example: 1
                  required:
                  - amount
                  - type
                taxes:
                  type: array
                  items:
                    type: object
                    properties:
                      taxClassId:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: Deliverect's Pizza Place
                      total:
                        type: integer
                        example: 1250
                taxRemitted:
                  type: integer
                  example: 1
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      plu:
                        type: string
                        example: PIE1
                      name:
                        type: string
                        example: Deliverect's Pizza Place
                      price:
                        type: integer
                        example: 1250
                      quantity:
                        type: integer
                        example: 1
                      remark:
                        type: string
                        example: No salad
                      discountReferenceIds:
                        type: array
                        items:
                          type: integer
                          example: 1
                      subItems:
                        type: array
                        items:
                          type: object
                          properties:
                            plu:
                              type: string
                              example: PIE1
                            name:
                              type: string
                              example: Deliverect's Pizza Place
                            price:
                              type: integer
                              example: 1250
                            quantity:
                              type: integer
                              example: 1
                            remark:
                              type: string
                              example: No salad
                            subItems:
                              type: array
                              items:
                                type: object
                                properties:
                                  plu:
                                    type: string
                                    example: PIE1
                                  name:
                                    type: string
                                    example: Deliverect's Pizza Place
                                  price:
                                    type: integer
                                    example: 1250
                                  quantity:
                                    type: integer
                                    example: 1
                                  remark:
                                    type: string
                                    example: No salad
                                  subItems:
                                    type: array
                                    items:
                                      type: object
                includeCutlery:
                  type: boolean
                  example: true
                table:
                  type: string
                  example: string
                orderIsAlreadyPaid:
                  type: boolean
                  example: true
                note:
                  type: string
                  example: No salad
                numberOfCustomers:
                  type: integer
                  example: 1
                customer:
                  type: object
                  properties:
                    name:
                      type: string
                      example: Deliverect's Pizza Place
                    companyName:
                      type: string
                      example: Deliverect's Pizza Place
                    phoneNumber:
                      type: string
                      example: '+15555550123'
                    phoneAccessCode:
                      type: string
                      example: '+15555550123'
                    email:
                      type: string
                      example: customer@example.com
                    tin:
                      type: string
                      example: string
                    note:
                      type: string
                      example: No salad
                deliveryCost:
                  type: integer
                  example: 1250
                deliveryCostTax:
                  type: integer
                  example: 1250
                serviceCharge:
                  type: integer
                  example: 1
                serviceChargeTax:
                  type: integer
                  example: 1
                tip:
                  type: integer
                  example: 1250
                driverTip:
                  type: integer
                  example: 1250
                bagFee:
                  type: integer
                  example: 1250
                discountTotal:
                  type: integer
                  example: 1250
                discounts:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        example: string
                      provider:
                        type: string
                        example: string
                      name:
                        type: string
                        example: Deliverect's Pizza Place
                      channelDiscountCode:
                        type: string
                        example: string
                      referenceId:
                        type: integer
                        example: 1
                      value:
                        type: integer
                        example: 1
                      amount:
                        type: integer
                        example: 1250
              required:
              - channelOrderId
              - channelOrderDisplayId
              - orderType
              - courier
              - payment
            examples:
              Create Order (Tax exclusive):
                summary: Create Order (Tax exclusive)
                value:
                  channelOrderId: TEST****629
                  channelOrderDisplayId: T**629
                  validationId: 62********************3x
                  orderType: 1
                  deliveryIsAsap: true
                  pickupTime: YYYY-MM-DDTHH:mm:ss.SSSSSSZ
                  deliveryTime: YYYY-MM-DDTHH:mm:ss.SSSSSSZ
                  placedTime: YYYY-MM-DDTHH:mm:ss.SSSSSSZ
                  courier: restaurant
                  ageCheck: false
                  deliveryAddress:
                    street: Adelaide Street East
                    streetNumber: '207'
                    postalCode: M5A1N4
                    area: Distillery District
                    city: Toronto
                    country: Canada
                    extraAddressInfo: 1st floor
                    coordinates:
                      latitude: 43.65152
                      longitude: -79.37128
                    verification:
                      pincode: ''
                  deliveryInfo:
                    packageSize: small
                    transportType: bicycle
                  decimalDigits: 2
                  payment:
                    amount: 1800
                    type: 0
                    due: 0
                  taxes:
                  - taxClassId: 0
                    name: taxes
                    total: 77
                  taxRemitted: 77
                  items:
                  - plu: P-SATE
                    name: Chicken Sate
                    price: 450
