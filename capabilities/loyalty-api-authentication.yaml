naftiko: 1.0.0-alpha2
info:
  label: Deliverect Loyalty API — Authentication
  description: 'Authentication surface of the Deliverect Loyalty API. 1 operations. Lead operation: Loyalty SSO - OAuth Token Exchange. Self-contained Naftiko capability covering one Deliverect business
    surface.'
  tags:
  - Deliverect
  - Loyalty
  - Authentication
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: loyalty-api-authentication
    baseUri: https://api.deliverect.com
    description: Deliverect Loyalty API — Authentication business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: auth-token
      path: /auth/token
      operations:
      - name: loyalty_token
        method: POST
        description: Deliverect Loyalty SSO - OAuth Token Exchange
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: loyalty-api-authentication-rest
    port: 8080
    description: REST adapter for Deliverect Loyalty API — Authentication. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/auth/token
      name: auth-token
      description: REST surface for auth-token.
      operations:
      - method: POST
        name: loyalty_token
        description: Deliverect Loyalty SSO - OAuth Token Exchange
        call: loyalty-api-authentication.loyalty_token
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: loyalty-api-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect Loyalty API — Authentication. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: loyalty-sso-oauth-token-exchange
      description: Deliverect Loyalty SSO - OAuth Token Exchange
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: loyalty-api-authentication.loyalty_token
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
