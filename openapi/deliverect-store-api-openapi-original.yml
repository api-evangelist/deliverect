      summary: Deliverect Snooze Product by PLU
      description: Mark products out of stock for a certain amount of time based on their PLU and location. You can use the same call to unsnooze product passing `snoozeEnd` time in the past.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              examples:
              - account: '{{account_id}}'
                location: '{{location_id}}'
                plus:
                - PLU1
                snoozeStart: '2019-03-06T15:45:00.000Z'
                snoozeEnd: '2019-03-07T15:45:00.000Z'
            examples:
              Example Snooze Request:
                summary: Example Snooze Request
                value:
                  account: 62********************2g
                  location: 62********************9k
                  plus:
                  - PLU_1
                  - PLU_2
                  snoozeEnd: YYYY-MM-DDTHH:mm:ss.SSSSSSZ
      responses:
        default:
          description: default
          content:
            text/plain:
              schema:
                type: string
              examples:
                example-0:
                  summary: Multiple PLUs across all locations
                  value: null
                example-1:
                  summary: Multiple PLUs for one location
                  value: null
                example-2:
                  summary: Single PLU for one location
                  value: null
                example-3:
                  summary: Single PLU across all locations
                  value: null
