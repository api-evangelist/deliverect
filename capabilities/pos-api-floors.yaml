naftiko: 1.0.0-alpha2
info:
  label: Deliverect POS API — Floors
  description: 'Floors surface of the Deliverect POS API. 1 operations. Lead operation: Sync Floors. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - POS
  - Floors
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: pos-api-floors
    baseUri: https://api.deliverect.com
    description: Deliverect POS API — Floors business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: floors-location-id
      path: /floors/locationId
      operations:
      - name: pos_floors_locationid
        method: GET
        description: Deliverect Sync Floors
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: pos-api-floors-rest
    port: 8080
    description: REST adapter for Deliverect POS API — Floors. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/floors/location-id
      name: floors-location-id
      description: REST surface for floors-location-id.
      operations:
      - method: GET
        name: pos_floors_locationid
        description: Deliverect Sync Floors
        call: pos-api-floors.pos_floors_locationid
        with: {}
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pos-api-floors-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect POS API — Floors. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: sync-floors
      description: Deliverect Sync Floors
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pos-api-floors.pos_floors_locationid
      with: {}
      outputParameters:
      - type: object
        mapping: $.
