naftiko: 1.0.0-alpha2
info:
  label: Deliverect Channel API — Orders
  description: 'Orders surface of the Deliverect Channel API. 5 operations. Lead operation: Create / Cancel Order. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - Channel
  - Orders
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: channel-api-orders
    baseUri: https://api.deliverect.com
    description: Deliverect Channel API — Orders business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: channel-name-order-channel-link-id
      path: /{channelName}/order/{channelLinkId}
      operations:
      - name: post_channelname_order_channellinkid
        method: POST
        description: Deliverect Create / Cancel Order
        inputParameters:
        - name: channelName
          in: path
          type: string
          required: true
          description: A unique scope provided to channel integrators to create orders in authorised locations
        - name: channelLinkId
          in: path
          type: string
          required: true
          description: The unique identifier of the channel in a specific location.
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: channel-order-status
      path: /channel/order_status
      operations:
      - name: channel_order_status
        method: POST
        description: Deliverect Order Status Update
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: channel-prep-time
      path: /channel/prep_time
      operations:
      - name: channel_prep_time
        method: POST
        description: Deliverect Preparation Time Update
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: channel-amendments
      path: /channel/amendments
      operations:
      - name: channel_amendments
        method: POST
        description: Deliverect Amendments
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: channel-name-update-rating
      path: /{channelName}/updateRating
      operations:
      - name: post_channelname_updaterating
        method: POST
        description: Deliverect Order Rating Update
        inputParameters:
        - name: channelName
          in: path
          type: string
          required: true
          description: The channelName value.
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: channel-api-orders-rest
    port: 8080
    description: REST adapter for Deliverect Channel API — Orders. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/{channel-name}/order/{channel-link-id}
      name: channel-name-order-channel-link-id
      description: REST surface for channel-name-order-channel-link-id.
      operations:
      - method: POST
        name: post_channelname_order_channellinkid
        description: Deliverect Create / Cancel Order
        call: channel-api-orders.post_channelname_order_channellinkid
        with:
          channelName: rest.channelName
          channelLinkId: rest.channelLinkId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/channel/order-status
      name: channel-order-status
      description: REST surface for channel-order-status.
      operations:
      - method: POST
        name: channel_order_status
        description: Deliverect Order Status Update
        call: channel-api-orders.channel_order_status
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/channel/prep-time
      name: channel-prep-time
      description: REST surface for channel-prep-time.
      operations:
      - method: POST
        name: channel_prep_time
        description: Deliverect Preparation Time Update
        call: channel-api-orders.channel_prep_time
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/channel/amendments
      name: channel-amendments
      description: REST surface for channel-amendments.
      operations:
      - method: POST
        name: channel_amendments
        description: Deliverect Amendments
        call: channel-api-orders.channel_amendments
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{channel-name}/update-rating
      name: channel-name-update-rating
      description: REST surface for channel-name-update-rating.
      operations:
      - method: POST
        name: post_channelname_updaterating
        description: Deliverect Order Rating Update
        call: channel-api-orders.post_channelname_updaterating
        with:
          channelName: rest.channelName
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: channel-api-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect Channel API — Orders. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
