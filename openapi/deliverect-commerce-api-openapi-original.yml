  /commerce/{accountId}/baskets:
    post:
      tags:
      - Baskets
      summary: Deliverect Create Basket
      description: This endpoint creates a Basket for the store.
      operationId: commerce_channel_api_baskets_create_basket
      parameters:
      - name: accountId
        in: path
        schema:
          type: string
          default: ''
        required: true
        description: The accountId value.
        example: 5b71c6489f00290d4
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - channelLinkId
              properties:
                channelLinkId:
                  type: string
                  description: ID of the store the basket is happening for.
                  default: ''
                  example: 5e8abc11dec0001a009b
                fulfillment:
                  type: object
                  required:
                  - type
                  properties:
                    type:
                      type: string
                      default: pickup
                      enum:
                      - pickup
                      - delivery
                      - eatIn
                      - dispatch
                      example: pickup
                items:
                  type: array
                  items:
                    properties:
                      menuId:
                        type: string
                        example: 609a1b2c3d4e5f6a7b8c9d0e
                      plu:
                        type: string
                        default: 3F_COMBO
                        example: 3F_COMBO
                      quantity:
                        type: integer
                        default: 2
                        format: int32
                        example: 2
                      note:
                        type: string
                        example: No salad
                      subItems:
                        type: array
                        items:
                          properties:
                            plu:
                              type: string
                              default: A_FRS
                              example: A_FRS
