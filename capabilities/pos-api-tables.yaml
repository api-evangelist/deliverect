naftiko: 1.0.0-alpha2
info:
  label: Deliverect POS API — Tables
  description: 'Tables surface of the Deliverect POS API. 1 operations. Lead operation: Sync Tables. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - POS
  - Tables
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: pos-api-tables
    baseUri: https://api.deliverect.com
    description: Deliverect POS API — Tables business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: tables-location-id
      path: /tables/locationId
      operations:
      - name: pos_tables_locationid
        method: GET
        description: Deliverect Sync Tables
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: pos-api-tables-rest
    port: 8080
    description: REST adapter for Deliverect POS API — Tables. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/tables/location-id
      name: tables-location-id
      description: REST surface for tables-location-id.
      operations:
      - method: GET
        name: pos_tables_locationid
        description: Deliverect Sync Tables
        call: pos-api-tables.pos_tables_locationid
        with: {}
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pos-api-tables-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect POS API — Tables. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: sync-tables
      description: Deliverect Sync Tables
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pos-api-tables.pos_tables_locationid
      with: {}
      outputParameters:
      - type: object
        mapping: $.
