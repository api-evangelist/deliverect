naftiko: 1.0.0-alpha2
info:
  label: Deliverect Commerce API — Menus
  description: 'Menus surface of the Deliverect Commerce API. 2 operations. Lead operation: Get Root Menu(s). Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - Commerce
  - Menus
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: commerce-api-menus
    baseUri: https://api.deliverect.com
    description: Deliverect Commerce API — Menus business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: commerce-account-id-menus
      path: /commerce/{accountId}/menus
      operations:
      - name: commerce_channel_api_menus_get_root_menus
        method: GET
        description: Deliverect Get Root Menu(s)
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
          description: The accountId value.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: commerce-account-id-stores-channel-link-id-menus
      path: /commerce/{accountId}/stores/{channelLinkId}/menus
      operations:
      - name: commerce_channel_api_stores_get_store_menus
        method: GET
        description: Deliverect Get Store Menu(s)
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
          description: The accountId value.
        - name: fulfillmentType
          in: query
          type: string
          required: false
          description: Possible values are; delivery | pickup | curbside | eatIn
        - name: channelLinkId
          in: path
          type: string
          required: true
          description: The channelLinkId value.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: commerce-api-menus-rest
    port: 8080
    description: REST adapter for Deliverect Commerce API — Menus. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/commerce/{account-id}/menus
      name: commerce-account-id-menus
      description: REST surface for commerce-account-id-menus.
      operations:
      - method: GET
        name: commerce_channel_api_menus_get_root_menus
        description: Deliverect Get Root Menu(s)
        call: commerce-api-menus.commerce_channel_api_menus_get_root_menus
        with:
          accountId: rest.accountId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/commerce/{account-id}/stores/{channel-link-id}/menus
      name: commerce-account-id-stores-channel-link-id-menus
      description: REST surface for commerce-account-id-stores-channel-link-id-menus.
      operations:
      - method: GET
        name: commerce_channel_api_stores_get_store_menus
        description: Deliverect Get Store Menu(s)
        call: commerce-api-menus.commerce_channel_api_stores_get_store_menus
        with:
          accountId: rest.accountId
          fulfillmentType: rest.fulfillmentType
          channelLinkId: rest.channelLinkId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: commerce-api-menus-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect Commerce API — Menus. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: get-root-menu-s
      description: Deliverect Get Root Menu(s)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: commerce-api-menus.commerce_channel_api_menus_get_root_menus
      with:
        accountId: tools.accountId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-store-menu-s
      description: Deliverect Get Store Menu(s)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: commerce-api-menus.commerce_channel_api_stores_get_store_menus
      with:
        accountId: tools.accountId
        fulfillmentType: tools.fulfillmentType
        channelLinkId: tools.channelLinkId
      outputParameters:
      - type: object
        mapping: $.
