naftiko: 1.0.0-alpha2
info:
  label: Deliverect Store API — Products
  description: 'Products surface of the Deliverect Store API. 4 operations. Lead operation: Get Products for Account. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - Store
  - Products
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: store-api-products
    baseUri: https://api.deliverect.com
    description: Deliverect Store API — Products business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: products
      path: /products
      operations:
      - name: get_products
        method: GET
        description: Deliverect Get Products for Account
        inputParameters:
        - name: where
          in: query
          type: string
          required: false
          description: The where value.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: products-snooze-by-plus
      path: /products/snoozeByPlus
      operations:
      - name: post_snooze_by_plu
        method: POST
        description: Deliverect Snooze Product by PLU
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: products-snooze-by-tags
      path: /products/snoozeByTags
      operations:
      - name: post_mark_products_out_of_stock_by_tag
        method: POST
        description: Deliverect Mark Products Out of Stock by Tag
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: channel-disabled-products
      path: /channelDisabledProducts
      operations:
      - name: get_get_channeldisabledproducts
        method: GET
        description: Deliverect Get Products Marked Out of Stock
        inputParameters:
        - name: Content-Type
          in: header
          type: string
          required: false
          description: The Content-Type value.
        - name: where
          in: query
          type: string
          required: false
          description: The where value.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: store-api-products-rest
    port: 8080
    description: REST adapter for Deliverect Store API — Products. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/products
      name: products
      description: REST surface for products.
      operations:
      - method: GET
        name: get_products
        description: Deliverect Get Products for Account
        call: store-api-products.get_products
        with:
          where: rest.where
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products/snooze-by-plus
      name: products-snooze-by-plus
      description: REST surface for products-snooze-by-plus.
      operations:
      - method: POST
        name: post_snooze_by_plu
        description: Deliverect Snooze Product by PLU
        call: store-api-products.post_snooze_by_plu
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products/snooze-by-tags
      name: products-snooze-by-tags
      description: REST surface for products-snooze-by-tags.
      operations:
      - method: POST
        name: post_mark_products_out_of_stock_by_tag
        description: Deliverect Mark Products Out of Stock by Tag
        call: store-api-products.post_mark_products_out_of_stock_by_tag
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/channel-disabled-products
      name: channel-disabled-products
      description: REST surface for channel-disabled-products.
      operations:
      - method: GET
        name: get_get_channeldisabledproducts
        description: Deliverect Get Products Marked Out of Stock
        call: store-api-products.get_get_channeldisabledproducts
        with:
          Content-Type: rest.Content-Type
          where: rest.where
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: store-api-products-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect Store API — Products. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: get-products-account
      description: Deliverect Get Products for Account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: store-api-products.get_products
      with:
        where: tools.where
      outputParameters:
      - type: object
        mapping: $.
    - name: snooze-product-plu
      description: Deliverect Snooze Product by PLU
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: store-api-products.post_snooze_by_plu
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: mark-products-out-stock-tag
      description: Deliverect Mark Products Out of Stock by Tag
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: store-api-products.post_mark_products_out_of_stock_by_tag
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-products-marked-out-stock
      description: Deliverect Get Products Marked Out of Stock
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: store-api-products.get_get_channeldisabledproducts
      with:
        Content-Type: tools.Content-Type
        where: tools.where
      outputParameters:
      - type: object
        mapping: $.
