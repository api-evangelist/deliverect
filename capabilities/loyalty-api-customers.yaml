naftiko: 1.0.0-alpha2
info:
  label: Deliverect Loyalty API — Customers
  description: 'Customers surface of the Deliverect Loyalty API. 2 operations. Lead operation: Create Loyalty Customer. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - Loyalty
  - Customers
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: loyalty-api-customers
    baseUri: https://api.deliverect.com
    description: Deliverect Loyalty API — Customers business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: loyalty-channel-link-id-customer
      path: /loyalty/{channelLinkId}/customer
      operations:
      - name: loyalty_channel_create_loyalty_customer
        method: POST
        description: Deliverect Create Loyalty Customer
        inputParameters:
        - name: channelLinkId
          in: path
          type: string
          required: true
          description: The channelLinkId value.
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: loyalty-channel-link-id-customer
      path: /loyalty/{channelLinkId}/customer
      operations:
      - name: loyalty_channel_get_customer
        method: GET
        description: Deliverect Get Loyalty Customer
        inputParameters:
        - name: channelLinkId
          in: path
          type: string
          required: true
          description: The channelLinkId value.
        - name: email
          in: query
          type: string
          required: false
          description: email of the end customer
        - name: phoneNumber
          in: query
          type: string
          required: false
          description: phone number of the end customer in E164 format
        - name: providerId
          in: query
          type: string
          required: false
          description: The customer's unique identifier within the loyalty provider's system, QR codes can also be passed via this parameter where supported on the Loyalty platform
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: loyalty-api-customers-rest
    port: 8080
    description: REST adapter for Deliverect Loyalty API — Customers. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/loyalty/{channel-link-id}/customer
      name: loyalty-channel-link-id-customer
      description: REST surface for loyalty-channel-link-id-customer.
      operations:
      - method: POST
        name: loyalty_channel_create_loyalty_customer
        description: Deliverect Create Loyalty Customer
        call: loyalty-api-customers.loyalty_channel_create_loyalty_customer
        with:
          channelLinkId: rest.channelLinkId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: loyalty_channel_get_customer
        description: Deliverect Get Loyalty Customer
        call: loyalty-api-customers.loyalty_channel_get_customer
        with:
          channelLinkId: rest.channelLinkId
          email: rest.email
          phoneNumber: rest.phoneNumber
          providerId: rest.providerId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: loyalty-api-customers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect Loyalty API — Customers. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: create-loyalty-customer
      description: Deliverect Create Loyalty Customer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: loyalty-api-customers.loyalty_channel_create_loyalty_customer
      with:
        channelLinkId: tools.channelLinkId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-loyalty-customer
      description: Deliverect Get Loyalty Customer
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: loyalty-api-customers.loyalty_channel_get_customer
      with:
        channelLinkId: tools.channelLinkId
        email: tools.email
        phoneNumber: tools.phoneNumber
        providerId: tools.providerId
      outputParameters:
      - type: object
        mapping: $.
