naftiko: 1.0.0-alpha2
info:
  label: Deliverect POS API — Orders
  description: 'Orders surface of the Deliverect POS API. 4 operations. Lead operation: Order Notification. Self-contained Naftiko capability covering one Deliverect business surface.'
  tags:
  - Deliverect
  - POS
  - Orders
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DELIVERECT_TOKEN: DELIVERECT_TOKEN
capability:
  consumes:
  - type: http
    namespace: pos-api-orders
    baseUri: https://api.deliverect.com
    description: Deliverect POS API — Orders business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DELIVERECT_TOKEN}}'
    resources:
    - name: orders
      path: /orders
      operations:
      - name: pos_ordercancel
        method: POST
        description: Deliverect Order Notification
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: order-status-order-id
      path: /orderStatus/{orderId}
      operations:
      - name: post_orderstatus_orderid
        method: POST
        description: Deliverect Post_orderstatus_orderid
        inputParameters:
        - name: orderId
          in: path
          type: string
          required: true
          description: The orderId value.
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: fulfillment-location-order-id
      path: /fulfillment/location/{orderId}
      operations:
      - name: order_delivery_update
        method: GET
        description: Deliverect Order Delivery Update
        inputParameters:
        - name: orderId
          in: path
          type: string
          required: true
          description: The orderId value.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: update-preparation-time
      path: /updatePreparationTime
      operations:
      - name: post_updatepreparationtime
        method: POST
        description: Deliverect Post_updatepreparationtime
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: pos-api-orders-rest
    port: 8080
    description: REST adapter for Deliverect POS API — Orders. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/orders
      name: orders
      description: REST surface for orders.
      operations:
      - method: POST
        name: pos_ordercancel
        description: Deliverect Order Notification
        call: pos-api-orders.pos_ordercancel
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/order-status/{order-id}
      name: order-status-order-id
      description: REST surface for order-status-order-id.
      operations:
      - method: POST
        name: post_orderstatus_orderid
        description: Deliverect Post_orderstatus_orderid
        call: pos-api-orders.post_orderstatus_orderid
        with:
          orderId: rest.orderId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fulfillment/location/{order-id}
      name: fulfillment-location-order-id
      description: REST surface for fulfillment-location-order-id.
      operations:
      - method: GET
        name: order_delivery_update
        description: Deliverect Order Delivery Update
        call: pos-api-orders.order_delivery_update
        with:
          orderId: rest.orderId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/update-preparation-time
      name: update-preparation-time
      description: REST surface for update-preparation-time.
      operations:
      - method: POST
        name: post_updatepreparationtime
        description: Deliverect Post_updatepreparationtime
        call: pos-api-orders.post_updatepreparationtime
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pos-api-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deliverect POS API — Orders. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: order-notification
      description: Deliverect Order Notification
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pos-api-orders.pos_ordercancel
      with: {}
      outputParameters:
      - type: object
        mapping: $.
    - name: post-orderstatus-orderid
      description: Deliverect Post_orderstatus_orderid
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pos-api-orders.post_orderstatus_orderid
      with:
        orderId: tools.orderId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: order-delivery-update
      description: Deliverect Order Delivery Update
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pos-api-orders.order_delivery_update
      with:
        orderId: tools.orderId
      outputParameters:
      - type: object
        mapping: $.
    - name: post-updatepreparationtime
      description: Deliverect Post_updatepreparationtime
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pos-api-orders.post_updatepreparationtime
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
